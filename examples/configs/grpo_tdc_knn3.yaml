# =============================================================================
# GRPO + Single-Turn TDC with KNN3 augmented prompts
#
# KNN3 data has longer prompts (up to ~18k tokens) due to retrieval-augmented
# context (top-3 similar molecules per class with molecular properties, MCS,
# and functional group diffs).
#
# Sequence budget:
#   - Prompt (input):  up to 18192 tokens
#   - Generation (output): up to 8192 tokens
#   - Total: 26384 tokens
#
# Usage:
#   uv run python examples/run_grpo.py --config examples/configs/grpo_tdc_knn3.yaml
#
#   # Override model, GPUs, etc:
#   uv run python examples/run_grpo.py --config examples/configs/grpo_tdc_knn3.yaml \
#       policy.model_name=unsloth/gpt-oss-20b-BF16 cluster.gpus_per_node=2
# =============================================================================

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8
  max_rollout_turns: 1  # Single-turn only
  max_num_epochs: 1
  max_num_steps: 500
  normalize_rewards: true
  use_leave_one_out_baseline: false
  val_period: 32
  val_at_start: true
  val_at_end: true
  overlong_filtering: false
  max_val_samples: 100000
  val_batch_size: 64
  seed: 42
  use_dynamic_sampling: true
  dynamic_sampling_max_gen_batches: 250
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  seq_logprob_error_threshold: null
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: "k1"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.27
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: false
  force_on_policy_ratio: false
  use_kl_in_reward: false
  # --- Liger Triton GRPO Loss (set to true to enable) ---
  use_liger_grpo_loss: false
  # Liger-specific config (only used when use_liger_grpo_loss=true):
  clip_eps_low: 0.2
  clip_eps_high: 0.27
  beta: 0.01       # KL penalty coefficient for Liger loss
  temperature: 1.0
  loss_type: "grpo"  # grpo, ipo, simpo

checkpointing:
  enabled: false
  checkpoint_dir: "results/grpo_tdc_knn3"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 32
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false

policy:
  model_name: "unsloth/gpt-oss-20b-BF16"
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 64
  train_micro_batch_size: 4
  generation_batch_size: 8
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 26384
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 2
    activation_checkpointing: true
    converter_type: "GPTOSSForCausalLM"
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: true
    apply_rope_fusion: true
    bias_activation_fusion: true
    defer_fp32_logits: true
    moe_per_layer_logging: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: true
    peft:
      enabled: false
      target_modules: []
      exclude_modules: []
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: null
    optimizer:
      optimizer: "adam"
      lr: 5.0e-7
      min_lr: 5.0e-8
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: true
      optimizer_offload_fraction: 1.0
    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 13
      lr_warmup_init: 5.0e-7
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false
    env_vars: null

  dynamic_batching:
    enabled: true
    train_mb_tokens: 16384
    logprob_mb_tokens: 32768
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 1.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: false
      fused: true

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 10
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [10]

  generation:
    backend: "vllm"
    max_new_tokens: 8192
    temperature: 1.0
    top_p: 0.95
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 20
      buffer_guaranteed_fraction: 0.1
      num_cuda_graphs: 512
      block_size_tokens: 256
      use_cuda_graphs_for_non_decode_steps: true
      enable_chunked_prefill: true
      unified_memory_level: 0
      max_tokens: 26384
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.7
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 1
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

# --- Data ---
# KNN3-augmented per-task JSONL files under data/tdc/knn3_format/.
# Each prompt includes top-3 similar molecules with properties, MCS, and
# functional group diffs, resulting in longer prompts (~6k tokens avg).
data:
  _override_: true
  max_input_seq_length: 18192
  shuffle: true
  num_workers: 2

  use_multiple_dataloader: false
  num_prompts_per_dataloader: 1
  custom_dataloader: examples.custom_dataloader.custom_dataloader.example_custom_dataloader

  train:
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/AMES_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/BBB_Martins_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Bioavailability_Ma_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP2C9_Substrate_CarbonMangels_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP2D6_Substrate_CarbonMangels_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP3A4_Substrate_CarbonMangels_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Carcinogens_Lagunin_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/ClinTox_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/DILI_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/HIA_Hou_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/PAMPA_NCATS_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Pgp_Broccatelli_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/SARSCoV2_3CLPro_Diamond_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/SARSCoV2_Vitro_Touret_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Skin_Reaction_train.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/hERG_train.jsonl
      input_key: messages
      output_key: answer

  validation:
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/AMES_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/BBB_Martins_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Bioavailability_Ma_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP2C9_Substrate_CarbonMangels_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP2D6_Substrate_CarbonMangels_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/CYP3A4_Substrate_CarbonMangels_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Carcinogens_Lagunin_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/ClinTox_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/DILI_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/HIA_Hou_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/PAMPA_NCATS_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Pgp_Broccatelli_val.jsonl
      input_key: messages
      output_key: answer
