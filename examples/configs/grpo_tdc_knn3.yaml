    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/Skin_Reaction_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/hERG_val.jsonl
      input_key: messages
      output_key: answer

  default:
    prompt_file: null
    system_prompt_file: null
    processor: "tdc_data_processor"
    env_name: "tdc"

# --- Environment ---
# Single-turn TDC only (no tool calling).
env:
  tdc:
    num_workers: 4

# --- Logger ---
logger:
  log_dir: "logs/grpo_tdc_knn3"
  num_val_samples_to_print: 3
  wandb_enabled: true
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "nemorl-tdc-grpo"
    name: "tdc-grpo-knn3"
  swanlab:
    project: "nemorl-tdc-grpo"
    name: "tdc-grpo-knn3"
  tensorboard: {}
  mlflow:
    experiment_name: "nemorl-tdc-grpo"
    run_name: "tdc-grpo-knn3"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 2
  num_nodes: 1
