      data_path: data/tdc/knn3_format/SARSCoV2_3CLPro_Diamond_val.jsonl
      input_key: messages
      output_key: answer
    - dataset_name: ResponseDataset
      data_path: data/tdc/knn3_format/SARSCoV2_Vitro_Touret_val.jsonl
      input_key: messages
